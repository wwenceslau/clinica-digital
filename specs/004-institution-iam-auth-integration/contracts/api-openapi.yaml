openapi: 3.0.3
info:
  title: Clinica Digital IAM API
  version: 0.3.0
  description: Contratos de IAM nativo in-app, registro institucional, sessao opaca, contexto do Shell e validacao RNDS para Organization, Location, Practitioner e PractitionerRole.
servers:
  - url: http://localhost:8080
paths:
  /api/public/clinic-registration:
    post:
      summary: Registra publicamente uma clinica e cria o primeiro admin
      operationId: registerClinic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantAdminRequest'
      responses:
        '201':
          description: Clinica e primeiro admin criados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantAdminResponse'
        '400':
          description: Falha de validacao estrutural/RNDS
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '409':
          description: Duplicidade de CNES ou email
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/tenants:
    post:
      summary: Cria organization e admin (super-user)
      operationId: createTenantAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantAdminRequest'
      responses:
        '201':
          description: Tenant e admin criados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantAdminResponse'
        '409':
          description: Duplicidade de nome/CNES/email
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/tenants/{tenantId}:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Atualiza dados cadastrais de um tenant existente
      operationId: updateTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
      responses:
        '200':
          description: Tenant atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSummaryResponse'
        '400':
          description: Requisicao invalida
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '404':
          description: Tenant nao encontrado
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
    delete:
      summary: Remove tenant existente
      operationId: deleteTenant
      responses:
        '204':
          description: Tenant removido com sucesso
        '404':
          description: Tenant nao encontrado
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/auth/login:
    post:
      summary: Autentica usuario por email e senha
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login processado
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginSingleOrgResponse'
                  - $ref: '#/components/schemas/LoginMultiOrgResponse'
        '401':
          description: Credenciais invalidas
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '429':
          description: Limite de tentativas excedido
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/auth/select-organization:
    post:
      summary: Seleciona organizacao apos login multi-tenant
      operationId: selectOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectOrganizationRequest'
      responses:
        '200':
          description: Sessao finalizada com tenant selecionado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionIssuedResponse'
        '400':
          description: Requisicao invalida
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '403':
          description: Organizacao nao permitida para o usuario
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/auth/logout:
    post:
      summary: Invalida a sessao atual
      operationId: logout
      responses:
        '200':
          description: Sessao invalidada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
  /api/users/me/context:
    get:
      summary: Retorna contexto autenticado do Shell
      operationId: getMyContext
      responses:
        '200':
          description: Contexto resolvido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContextResponse'
        '401':
          description: Sessao invalida ou expirada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '403':
          description: Sem role/location ativa permitida
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/users/me/active-location:
    post:
      summary: Seleciona a location ativa do usuario autenticado
      operationId: setActiveLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetActiveLocationRequest'
      responses:
        '200':
          description: Contexto atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContextResponse'
        '403':
          description: Location nao permitida para o practitioner
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/users:
    post:
      summary: Cria usuario profile 20 no tenant do admin autenticado
      operationId: createTenantUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantUserRequest'
      responses:
        '201':
          description: Usuario criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantUserResponse'
        '409':
          description: Duplicidade de email ou conflito de identificador
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/locations:
    get:
      summary: Lista locations administrativas do tenant autenticado
      operationId: listAdminLocations
      responses:
        '200':
          description: Lista de locations retornada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminLocationResponse'
        '401':
          description: Sessao invalida ou expirada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '403':
          description: Somente admin (profile 10)
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
    post:
      summary: Cria location administrativa no tenant autenticado
      operationId: createAdminLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminLocationRequest'
      responses:
        '201':
          description: Location criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLocationResponse'
        '400':
          description: Payload invalido
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '404':
          description: Organizacao nao encontrada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/locations/{locationId}:
    put:
      summary: Atualiza location administrativa no tenant autenticado
      operationId: updateAdminLocation
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminLocationRequest'
      responses:
        '200':
          description: Location atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLocationResponse'
        '404':
          description: Location nao encontrada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/locations/{locationId}/deactivate:
    post:
      summary: Desativa location administrativa no tenant autenticado
      operationId: deactivateAdminLocation
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Location desativada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLocationResponse'
        '404':
          description: Location nao encontrada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/practitioner-roles:
    get:
      summary: Lista lotacoes administrativas do tenant autenticado
      operationId: listAdminPractitionerRoles
      responses:
        '200':
          description: Lista de lotacoes retornada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminPractitionerRoleResponse'
        '401':
          description: Sessao invalida ou expirada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '403':
          description: Somente admin (profile 10)
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
    post:
      summary: Cria lotacao administrativa no tenant autenticado
      operationId: createAdminPractitionerRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminPractitionerRoleRequest'
      responses:
        '201':
          description: Lotacao criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPractitionerRoleResponse'
        '400':
          description: Payload invalido
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '404':
          description: Dependencia nao encontrada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/practitioner-roles/{roleId}:
    put:
      summary: Atualiza lotacao administrativa no tenant autenticado
      operationId: updateAdminPractitionerRole
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminPractitionerRoleRequest'
      responses:
        '200':
          description: Lotacao atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPractitionerRoleResponse'
        '404':
          description: Lotacao nao encontrada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/practitioner-roles/{roleId}/deactivate:
    post:
      summary: Desativa lotacao administrativa no tenant autenticado
      operationId: deactivateAdminPractitionerRole
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lotacao desativada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPractitionerRoleResponse'
        '404':
          description: Lotacao nao encontrada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/groups:
    get:
      summary: Lista os grupos de permissao do tenant autenticado
      operationId: listGroups
      responses:
        '200':
          description: Lista de grupos retornada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupSummary'
        '401':
          description: Sessao invalida ou expirada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '403':
          description: Permissao insuficiente para listar grupos
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
    post:
      summary: Cria um grupo de permissao no tenant autenticado
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Grupo criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupSummary'
        '400':
          description: Payload invalido
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '409':
          description: Nome de grupo duplicado no tenant
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/groups/{groupId}/permissions:
    get:
      summary: Lista permissoes atribuidas ao grupo
      operationId: listGroupPermissions
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de permissoes do grupo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermissionSummary'
    post:
      summary: Adiciona uma permissao a um grupo
      operationId: addPermissionToGroup
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPermissionRequest'
      responses:
        '204':
          description: Permissao adicionada
        '400':
          description: Payload invalido
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '403':
          description: Permissao insuficiente
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '404':
          description: Grupo nao encontrado
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/groups/{groupId}/permissions/{permissionId}:
    delete:
      summary: Remove permissao de um grupo
      operationId: removePermissionFromGroup
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: permissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Permissao removida
  /api/admin/groups/{groupId}/members:
    get:
      summary: Lista membros de um grupo
      operationId: listGroupMembers
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de membros do grupo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupMemberSummary'
  /api/admin/groups/{groupId}/members/{userId}:
    delete:
      summary: Remove membro de um grupo
      operationId: removeGroupMember
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Membro removido
  /api/admin/groups/{groupId}:
    delete:
      summary: Exclui grupo RBAC
      operationId: deleteGroup
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Grupo excluido
  /api/admin/users/{userId}/permissions:
    get:
      summary: Lista permissoes efetivas de um usuario
      operationId: getUserPermissions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de permissoes efetivas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermissionSummary'
        '403':
          description: Permissao insuficiente
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '404':
          description: Usuario nao encontrado
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/audit:
    get:
      summary: Lista trilha de auditoria por tenant
      operationId: listAuditEvents
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Eventos de auditoria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEventSummary'
  /api/admin/sessions:
    get:
      summary: Lista sessoes administrativas do tenant
      operationId: listAdminSessions
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Lista de sessoes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminSessionSummary'
  /api/admin/sessions/{sessionId}/revoke:
    post:
      summary: Revoga sessao administrativa com motivo auditavel
      operationId: revokeAdminSession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeAdminSessionRequest'
      responses:
        '204':
          description: Sessao revogada
components:
  schemas:
    IdentifierLite:
      type: object
      required: [system, value]
      properties:
        system:
          type: string
          format: uri
        value:
          type: string
        use:
          type: string
    HumanNameLite:
      type: object
      required: [text]
      properties:
        text:
          type: string
        family:
          type: string
        given:
          type: array
          items:
            type: string
    ContactPointLite:
      type: object
      required: [system, value]
      properties:
        system:
          type: string
          enum: [phone, fax, email, pager, url, sms, other]
        value:
          type: string
        use:
          type: string
    AddressLite:
      type: object
      properties:
        line:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
    MetaProfile:
      type: object
      required: [profile]
      properties:
        profile:
          type: array
          minItems: 1
          items:
            type: string
            format: uri
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    SelectOrganizationRequest:
      type: object
      required: [challengeToken, organizationId]
      properties:
        challengeToken:
          type: string
        organizationId:
          type: string
          format: uuid
    SetActiveLocationRequest:
      type: object
      required: [locationId]
      properties:
        locationId:
          type: string
          format: uuid
    PractitionerCreateInput:
      type: object
      required: [displayName, email, cpf, password, identifiers, names, meta]
      properties:
        displayName:
          type: string
        email:
          type: string
          format: email
        cpf:
          type: string
        password:
          type: string
          minLength: 8
        identifiers:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IdentifierLite'
        names:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/HumanNameLite'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/ContactPointLite'
        address:
          type: array
          items:
            $ref: '#/components/schemas/AddressLite'
        meta:
          $ref: '#/components/schemas/MetaProfile'
    OrganizationCreateInput:
      type: object
      required: [name, displayName, cnes, identifiers, meta]
      properties:
        name:
          type: string
        displayName:
          type: string
        cnes:
          type: string
          minLength: 7
          maxLength: 7
        active:
          type: boolean
          default: true
        accountActive:
          type: boolean
          default: true
        identifiers:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IdentifierLite'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/ContactPointLite'
        address:
          type: array
          items:
            $ref: '#/components/schemas/AddressLite'
        meta:
          $ref: '#/components/schemas/MetaProfile'
    CreateTenantAdminRequest:
      type: object
      required: [organization, adminPractitioner]
      properties:
        organization:
          $ref: '#/components/schemas/OrganizationCreateInput'
        adminPractitioner:
          $ref: '#/components/schemas/PractitionerCreateInput'
    CreateTenantUserRequest:
      type: object
      required: [practitioner, locationId, roleCode]
      properties:
        practitioner:
          $ref: '#/components/schemas/PractitionerCreateInput'
        locationId:
          type: string
          format: uuid
        roleCode:
          type: string
    CreateAdminLocationRequest:
      type: object
      required: [organizationId, displayName]
      properties:
        organizationId:
          type: string
          format: uuid
        displayName:
          type: string
        fhirName:
          type: string
        fhirStatus:
          type: string
        fhirMode:
          type: string
    UpdateAdminLocationRequest:
      type: object
      properties:
        displayName:
          type: string
        fhirName:
          type: string
        fhirStatus:
          type: string
        fhirMode:
          type: string
        accountActive:
          type: boolean
    AdminLocationResponse:
      type: object
      required: [id, tenantId, organizationId, displayName, fhirName, fhirStatus, fhirMode, accountActive]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        displayName:
          type: string
        fhirName:
          type: string
        fhirStatus:
          type: string
        fhirMode:
          type: string
        accountActive:
          type: boolean
    CreateAdminPractitionerRoleRequest:
      type: object
      required: [organizationId, locationId, practitionerId, roleCode]
      properties:
        organizationId:
          type: string
          format: uuid
        locationId:
          type: string
          format: uuid
        practitionerId:
          type: string
          format: uuid
        roleCode:
          type: string
        primaryRole:
          type: boolean
        fhirCodeJson:
          type: string
        fhirSpecialtyJson:
          type: string
        fhirTelecomJson:
          type: string
        fhirAvailableTimeJson:
          type: string
    UpdateAdminPractitionerRoleRequest:
      type: object
      properties:
        roleCode:
          type: string
        active:
          type: boolean
        primaryRole:
          type: boolean
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time

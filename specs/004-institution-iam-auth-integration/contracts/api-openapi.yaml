openapi: 3.0.3
info:
  title: Clinica Digital IAM API
  version: 0.2.0
  description: Contratos de IAM nativo in-app, registro institucional, sessao opaca, contexto do Shell e validacao RNDS para Organization, Location, Practitioner e PractitionerRole.
servers:
  - url: http://localhost:8080
paths:
  /api/public/clinic-registration:
    post:
      summary: Registra publicamente uma clinica e cria o primeiro admin
      operationId: registerClinic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantAdminRequest'
      responses:
        '201':
          description: Clinica e primeiro admin criados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantAdminResponse'
        '400':
          description: Falha de validacao estrutural/RNDS
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '409':
          description: Duplicidade de CNES ou email
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/tenants:
    post:
      summary: Cria organization e admin (super-user)
      operationId: createTenantAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantAdminRequest'
      responses:
        '201':
          description: Tenant e admin criados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantAdminResponse'
        '409':
          description: Duplicidade de nome/CNES/email
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/auth/login:
    post:
      summary: Autentica usuario por email e senha
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login processado
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginSingleOrgResponse'
                  - $ref: '#/components/schemas/LoginMultiOrgResponse'
        '401':
          description: Credenciais invalidas
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '429':
          description: Limite de tentativas excedido
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/auth/select-organization:
    post:
      summary: Seleciona organizacao apos login multi-tenant
      operationId: selectOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectOrganizationRequest'
      responses:
        '200':
          description: Sessao finalizada com tenant selecionado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionIssuedResponse'
        '400':
          description: Requisicao invalida
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '403':
          description: Organizacao nao permitida para o usuario
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/auth/logout:
    post:
      summary: Invalida a sessao atual
      operationId: logout
      responses:
        '200':
          description: Sessao invalidada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
  /api/users/me/context:
    get:
      summary: Retorna contexto autenticado do Shell
      operationId: getMyContext
      responses:
        '200':
          description: Contexto resolvido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContextResponse'
        '401':
          description: Sessao invalida ou expirada
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        '403':
          description: Sem role/location ativa permitida
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/users/me/active-location:
    post:
      summary: Seleciona a location ativa do usuario autenticado
      operationId: setActiveLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetActiveLocationRequest'
      responses:
        '200':
          description: Contexto atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContextResponse'
        '403':
          description: Location nao permitida para o practitioner
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
  /api/admin/users:
    post:
      summary: Cria usuario profile 20 no tenant do admin autenticado
      operationId: createTenantUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantUserRequest'
      responses:
        '201':
          description: Usuario criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantUserResponse'
        '409':
          description: Duplicidade de email ou conflito de identificador
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
components:
  schemas:
    IdentifierLite:
      type: object
      required: [system, value]
      properties:
        system:
          type: string
          format: uri
        value:
          type: string
        use:
          type: string
    HumanNameLite:
      type: object
      required: [text]
      properties:
        text:
          type: string
        family:
          type: string
        given:
          type: array
          items:
            type: string
    ContactPointLite:
      type: object
      required: [system, value]
      properties:
        system:
          type: string
          enum: [phone, fax, email, pager, url, sms, other]
        value:
          type: string
        use:
          type: string
    AddressLite:
      type: object
      properties:
        line:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
    MetaProfile:
      type: object
      required: [profile]
      properties:
        profile:
          type: array
          minItems: 1
          items:
            type: string
            format: uri
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    SelectOrganizationRequest:
      type: object
      required: [challengeToken, organizationId]
      properties:
        challengeToken:
          type: string
        organizationId:
          type: string
          format: uuid
    SetActiveLocationRequest:
      type: object
      required: [locationId]
      properties:
        locationId:
          type: string
          format: uuid
    PractitionerCreateInput:
      type: object
      required: [displayName, email, cpf, password, identifiers, names, meta]
      properties:
        displayName:
          type: string
        email:
          type: string
          format: email
        cpf:
          type: string
        password:
          type: string
          minLength: 8
        identifiers:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IdentifierLite'
        names:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/HumanNameLite'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/ContactPointLite'
        address:
          type: array
          items:
            $ref: '#/components/schemas/AddressLite'
        meta:
          $ref: '#/components/schemas/MetaProfile'
    OrganizationCreateInput:
      type: object
      required: [name, displayName, cnes, identifiers, meta]
      properties:
        name:
          type: string
        displayName:
          type: string
        cnes:
          type: string
          minLength: 7
          maxLength: 7
        active:
          type: boolean
          default: true
        accountActive:
          type: boolean
          default: true
        identifiers:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IdentifierLite'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/ContactPointLite'
        address:
          type: array
          items:
            $ref: '#/components/schemas/AddressLite'
        meta:
          $ref: '#/components/schemas/MetaProfile'
    CreateTenantAdminRequest:
      type: object
      required: [organization, adminPractitioner]
      properties:
        organization:
          $ref: '#/components/schemas/OrganizationCreateInput'
        adminPractitioner:
          $ref: '#/components/schemas/PractitionerCreateInput'
    CreateTenantUserRequest:
      type: object
      required: [practitioner, locationId, roleCode]
      properties:
        practitioner:
          $ref: '#/components/schemas/PractitionerCreateInput'
        locationId:
          type: string
          format: uuid
        roleCode:
          type: string
    OrganizationSummary:
      type: object
      required: [id, name, displayName, cnes, identifiers, active, accountActive]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        displayName:
          type: string
        cnes:
          type: string
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/IdentifierLite'
        active:
          type: boolean
        accountActive:
          type: boolean
    LocationSummary:
      type: object
      required: [id, displayName, name, active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        displayName:
          type: string
        active:
          type: boolean
    PractitionerSummary:
      type: object
      required: [id, email, profileType, displayName, accountActive, identifiers, names]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        profileType:
          type: integer
          enum: [0, 10, 20]
        displayName:
          type: string
        accountActive:
          type: boolean
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/IdentifierLite'
        names:
          type: array
          items:
            $ref: '#/components/schemas/HumanNameLite'
    PractitionerRoleSummary:
      type: object
      required: [id, roleCode, active, organization, location]
      properties:
        id:
          type: string
          format: uuid
        roleCode:
          type: string
        active:
          type: boolean
        organization:
          $ref: '#/components/schemas/OrganizationSummary'
        location:
          $ref: '#/components/schemas/LocationSummary'
    LoginSingleOrgResponse:
      type: object
      required: [mode, session]
      properties:
        mode:
          type: string
          enum: [single]
        session:
          $ref: '#/components/schemas/SessionIssuedResponse'
    LoginMultiOrgResponse:
      type: object
      required: [mode, challengeToken, organizations]
      properties:
        mode:
          type: string
          enum: [multiple]
        challengeToken:
          type: string
        organizations:
          type: array
          minItems: 2
          items:
            type: object
            required: [organizationId, displayName, cnes]
            properties:
              organizationId:
                type: string
                format: uuid
              displayName:
                type: string
              cnes:
                type: string
    SessionIssuedResponse:
      type: object
      required: [expiresAt, practitioner, tenant]
      properties:
        expiresAt:
          type: string
          format: date-time
        practitioner:
          $ref: '#/components/schemas/PractitionerSummary'
        tenant:
          $ref: '#/components/schemas/OrganizationSummary'
        activePractitionerRole:
          $ref: '#/components/schemas/PractitionerRoleSummary'
    UserContextResponse:
      type: object
      required: [tenantId, organizationId, organizationName, locationId, locationName, practitionerId, practitionerName, profileType]
      properties:
        tenantId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        organizationName:
          type: string
        locationId:
          type: string
          format: uuid
        locationName:
          type: string
        practitionerId:
          type: string
          format: uuid
        practitionerName:
          type: string
        profileType:
          type: integer
          enum: [0, 10, 20]
        practitionerRole:
          $ref: '#/components/schemas/PractitionerRoleSummary'
    CreateTenantAdminResponse:
      type: object
      required: [tenantId, adminPractitionerId, tenant, adminPractitioner]
      properties:
        tenantId:
          type: string
          format: uuid
        adminPractitionerId:
          type: string
          format: uuid
        tenant:
          $ref: '#/components/schemas/OrganizationSummary'
        adminPractitioner:
          $ref: '#/components/schemas/PractitionerSummary'
    CreateTenantUserResponse:
      type: object
      required: [userId, practitionerId, practitionerRoleId, practitioner]
      properties:
        userId:
          type: string
          format: uuid
        practitionerId:
          type: string
          format: uuid
        practitionerRoleId:
          type: string
          format: uuid
        practitioner:
          $ref: '#/components/schemas/PractitionerSummary'
    LogoutResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [revoked]
    OperationOutcome:
      type: object
      required: [resourceType, issue]
      properties:
        resourceType:
          type: string
          enum: [OperationOutcome]
        issue:
          type: array
          minItems: 1
          items:
            type: object
            required: [severity, code, details]
            properties:
              severity:
                type: string
                enum: [fatal, error, warning, information]
              code:
                type: string
              details:
                type: object
                required: [text]
                properties:
                  text:
                    type: string
              diagnostics:
                type: string

name: Drift Verify

on:
  pull_request:
    branches:
      - '**'

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify spec-plan-task drift rules
        shell: bash
        run: |
          bash scripts/drift-verify.sh

name: SBOM Generation

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main
      - develop

jobs:
  sbom-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate CycloneDX SBOM (backend)
        run: mvn -B -ntp org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Upload backend SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend
          path: backend/target/bom.xml

  sbom-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM (frontend)
        run: npx -y @cyclonedx/cyclonedx-npm --output-file sbom-frontend.xml

      - name: Upload frontend SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-frontend
          path: frontend/sbom-frontend.xml

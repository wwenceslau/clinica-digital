name: Backend Quality Gate

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-quality.yml'

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Runs the Maven 'quality' profile which activates SpotBugs, SonarQube, and JaCoCo.
      # JaCoCo applies two coverage rules (defined in the quality profile in backend/pom.xml):
      #   - Global: instruction coverage >= 80%
      #   - IAM-critical (packages com/clinicadigital/iam/** and com/clinicadigital/shared/tenant/**):
      #       instruction coverage >= 90%
      # Class-name filter: *PasswordHasher, *SessionRepository, *TenantContext,
      #   *TenantContextHolder, *SessionRevocation, *AuditEventWriter, *TenantJdbcContextInterceptor
      # See tasks.md T038 for the authoritative IAM-critical scope definition.
      - name: Run backend verify with quality profile
        run: mvn -B -ntp clean verify -Pquality
